# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: string_xy
  - override /model: embed_regress_nopretrain
  - override /callbacks: default
  - override /trainer: default
  - override /logger: wandb
  - override /task: design_bench

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["universal", "embed_regress", "multi_task"]

seed: 42

data:
  task_names: AntMorphology-Exact-v0,DKittyMorphology-Exact-v0,Superconductor-RandomForest-v0,TFBind8-Exact-v0,TFBind10-Exact-v0
  batch_size: 128
  tokenizer_max_length: 400

trainer:
  min_epochs: 2
  max_epochs: 200

model:
  metadata_embedder: 
    _target_: transformers.AutoModel.from_pretrained
    pretrained_model_name_or_path: sentence-transformers/all-MiniLM-L6-v2
  metadata_embedder_output_dim: 384

  metadata_embedder_optimizer:
    _target_: torch.optim.AdamW
    _partial_: true 
    lr: 0.0001
    weight_decay: 0.00001

  metadata_projector:
    _target_: torch.nn.Linear
    in_features: 384
    out_features: 32
  metadata_projector_output_dim: 32

  regressor:
    input_dim: 416
  

task:
  task_name: Superconductor-RandomForest-v0

task_name: embed_regress_multitask_m_emb_from_scratch

logger:
  wandb:
    tags: ${tags}
    project: "Universal"
    group: ${task_name}
    job_type: "train"
