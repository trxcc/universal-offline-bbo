# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: string_xy
  - override /model: embed_regress_t5
  - override /callbacks: default
  - override /trainer: default
  - override /logger: wandb
  - override /task: design_bench

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["universal", "embed_regress", "multi_task"]

seed: 42

data:
  task_names: ALL
  batch_size: 128
  tokenizer_max_length: 400
  cat_metadata: true

  tokenizer:
    _target_: transformers.AutoTokenizer.from_pretrained
    pretrained_model_name_or_path: gpt2
    padding_side: right
    model_max_length: 512
    pad_token: "<|endoftext|>"  
    requires_grad: false

trainer:
  min_epochs: 2
  max_epochs: 200

model:
  embedder:
    config:
      vocab_size: 50257
      
  from_pretrained: false

task:
  task_name: Superconductor-RandomForest-v0

task_name: embed_regress_multitask_bpe

logger:
  wandb:
    tags: ${tags}
    project: "Universal"
    group: ${task_name}
    job_type: "train"
