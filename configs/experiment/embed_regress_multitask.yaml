# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: string_xy
  - override /model: embed_regress
  - override /callbacks: default
  - override /trainer: default
  - override /logger: wandb
  - override /task: design_bench

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["universal", "embed_regress"]

seed: 12345

trainer:
  min_epochs: 200
  max_epochs: 200
#   gradient_clip_val: 0.5

# model:
#   optimizer:
#     lr: 0.002
#   net:
#     lin1_size: 128
#     lin2_size: 256
#     lin3_size: 64
#   compile: false

task:
  task_name: Superconductor-RandomForest-v0

data:
  batch_size: 128

logger:
  wandb:
    tags: ${tags}
    project: "Universal"
    group: "vanilla_regress"
    job_type: "train"

task_name: embed_regress_${task.task_name}
